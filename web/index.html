<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steinway MIDI Piano</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>

      <button
        type="button"
        id="menu-toggle"
        class="menu-toggle"
        aria-label="Open controls"
        aria-expanded="false"
        aria-controls="drawer"
      >
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.6" />
          <path
            d="M12 2.5v2.4M12 19.1v2.4M21.5 12h-2.4M4.9 12H2.5M18.7 5.3l-1.7 1.7M7 17l-1.7 1.7M18.7 18.7 17 17M7 7 5.3 5.3"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>
      </button>

      <p id="status" class="toast" role="status" aria-live="polite"></p>

      <aside
        id="drawer"
        class="drawer"
        aria-label="Steinway MIDI controls"
        aria-hidden="true"
      >
        <div class="drawer-head">
          <span class="wordmark">STEINWAY</span>
          <button type="button" id="drawer-close" class="icon-btn" aria-label="Close controls">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <label class="field">
          <span>MIDI input</span>
          <select id="midi-port" disabled>
            <option value="">Loading ports…</option>
          </select>
        </label>

        <div class="transport">
          <button type="button" id="btn-start" class="primary" disabled>Start</button>
          <button type="button" id="btn-stop" disabled>Stop</button>
        </div>

        <div class="field">
          <span>View</span>
          <div class="views">
            <button type="button" id="view-hero" title="Hero (1)">Hero <kbd>1</kbd></button>
            <button type="button" id="view-front" title="Front (2)">Front <kbd>2</kbd></button>
            <button type="button" id="view-top" title="Top (3)">Top <kbd>3</kbd></button>
            <button type="button" id="view-seated" title="Seated (4)">Seated <kbd>4</kbd></button>
          </div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
